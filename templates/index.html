<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema Soldagem</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container mt-5">

    <h1 class="mb-4">Sistema de Soldagem</h1>

    <table class="table table-dark table-striped">

        <thead>
            <tr>
                <th>EPS</th>
                <th>WPS</th>
                <th>OBS</th>
            </tr>
        </thead>

        <tbody>

            {% for item in itens %}

            <tr>
                <td>{{ item.eps }}</td>
                <td>{{ item.wps }}</td>
                <td>{{ item.obs }}</td>
            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
