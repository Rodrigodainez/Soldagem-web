<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Sistema Soldagem</title>

    <!-- Integrar Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Melhorar a aparência do campo de busca */
        #search {
            transition: box-shadow 0.3s, border-color 0.3s;
        }
        #search:focus {
            box-shadow: 0 0 0 4px rgba(88, 115, 255, 0.3);
            border-color: #5873ff;
        }
        /* Adicionar espaçamento ao rodapé */
        footer {
            margin-top: auto;
            padding: 1rem;
            background: #23272a;
        }
    </style>
</head>

<body class="bg-dark text-light d-flex flex-column min-vh-100">

    <!-- Barra de navegação -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">🔥 Sistema de Soldagem</a>
        </div>
    </nav>

    <div class="container mt-5">

        <!-- Cabeçalho e barra de busca -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3">Sistema de Busca</h1>
            <input
                type="text"
                id="search"
                class="form-control w-50 w-md-25"
                placeholder="Buscar EPS..."
            >
        </div>

        <!-- Tabela -->
        <div class="table-responsive">
            <table class="table table-dark table-hover table-striped align-middle text-center">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>EPS</th>
                        <th>WPS</th>
                        <th>OBS</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    {% for item in itens %}
                    <tr>
                        <td>{{ forloop.counter }}</td>
                        <td>{{ item.eps }}</td>
                        <td>{{ item.wps }}</td>
                        <td>{{ item.obs }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <!-- Estado vazio -->
        <div id="emptyState" class="text-center mt-3 d-none">
            <p class="text-warning">Nenhum item encontrado. 🙁</p>
        </div>

    </div>

    <!-- Rodapé -->
    <footer class="text-center text-light">
        <small>&copy; 2026 Sistema de Soldagem. Todos os direitos reservados.</small>
    </footer>

    <!-- Script -->
    <script>
